name: Auto sync develop to main

on:
  schedule:
    - cron: '30 14 * * *'
      timezone: 'Asia/Seoul'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branches
        run: |
          git fetch origin main develop

      - name: Create or reuse PR from develop to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Existing PR found: #$PR_NUMBER"
            exit 0
          fi

          if git diff --quiet origin/main...origin/develop; then
            echo "No changes between develop and main."
            exit 0
          fi

          echo "No existing PR. Creating one..."
          gh pr create \
            --base main \
            --head develop \
            --title "chore: sync develop into main" \
            --body "Automated PR to sync develop into main every day at 14:20 KST."

      - name: Enable auto merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --merge --auto
