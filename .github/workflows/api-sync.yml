name: Frontend Type Sync

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  type-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: pnpm build
        run: pnpm run build

      - name: Generate API types
        run: pnpm exec openapi-typescript ${{ secrets.OPENAPI_URL }} -o src/shared/types/api/schemas/api.types.ts

      - name: Type check
        run: pnpm run typecheck

      - name: Check for generated file changes
        run: |
          git diff --exit-code src/shared/types/api/schemas/api.types.ts
